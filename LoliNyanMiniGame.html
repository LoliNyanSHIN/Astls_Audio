<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 五子棋 · 连珠消除 · 幻光版</title>
	
	<link rel="stylesheet" href="font/Maple.css">
	<link rel="stylesheet" href="main/css/main.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Maple', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a141c 0%, #1a2a33 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 现代化玻璃面板容器 */
        .game-container {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            max-width: 1400px;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        /* 棋盘区域 */
        .board-section {
            flex: 1 1 640px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        canvas#board {
            width: 100%;
            aspect-ratio: 1/1;
            max-width: 640px;
            background: #2d4a3b;  /* 将被CSS变量覆盖 */
            border-radius: 32px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(255, 215, 140, 0.2) inset;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* 右侧信息面板 — 毛玻璃霓虹 */
        .info-panel {
            flex: 0 1 340px;
            background: rgba(18, 30, 36, 0.7);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border-radius: 48px;
            padding: 32px 28px;
            color: #eef5e1;
            box-shadow: 0 30px 40px -15px black, 0 0 0 1px rgba(255, 220, 150, 0.15) inset;
            border: 1px solid rgba(255, 215, 140, 0.2);
            display: flex;
            flex-direction: column;
            gap: 24px;
            transition: background 0.3s;
        }

        /* 模式切换按钮组 */
        .mode-bar {
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.25);
            padding: 8px;
            border-radius: 60px;
            border: 1px solid rgba(255, 200, 120, 0.2);
        }

        .mode-btn {
            background: transparent;
            border: none;
            color: #bcd4d1;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            backdrop-filter: blur(5px);
            letter-spacing: 0.5px;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #ffb347, #ff8c42);
            color: #0a141c;
            box-shadow: 0 5px 15px #ff8c4260;
            font-weight: 700;
        }

        .mode-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 28px;
            padding: 16px 8px;
            text-align: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 215, 140, 0.15);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.7;
            color: #cddac2;
        }

        .stat-value {
            font-size: 2.4rem;
            font-weight: 800;
            line-height: 1.2;
            text-shadow: 0 0 10px currentColor;
        }

        .black-stat { color: #c0c0c0; text-shadow: 0 0 8px #aaaaaa; }
        .white-stat { color: #f5e6d3; text-shadow: 0 0 12px #ffdab9; }

        /* 回合指示器 */
        .turn-indicator {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            padding: 12px 20px;
            border: 1px solid rgba(255, 190, 80, 0.3);
        }

        .stone-badge {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--black-stone);
            box-shadow: 0 6px 10px rgba(0,0,0,0.6), 0 0 0 2px #ffb34780;
        }

        .stone-badge.white {
            background: var(--white-stone);
        }

        #currentPlayerText {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff8e7, #ffdbb5);
            /* -webkit-background-clip: text; */
            -webkit-text-fill-color: transparent;
        }

        .combo-fire {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #ffa726, #ff5722);
            /* -webkit-background-clip: text; */
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px #ff6a00);
        }

        /* 计时区域 */
        .timer-section {
            background: rgba(0, 20, 20, 0.5);
            border-radius: 40px;
            padding: 18px;
            text-align: center;
            border: 1px solid #ffb34740;
        }

        .total-timer {
            font-size: 3rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: #ffeca1;
            text-shadow: 0 0 15px #ffb347;
            letter-spacing: 4px;
        }

        #moveTimer {
            font-size: 1rem;
            color: #aac3b5;
        }

        /* 按钮组 */
        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 200, 120, 0.3);
            color: #f0ead0;
            padding: 14px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: 0.2s;
            flex: 1;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }

        .btn.primary {
            background: linear-gradient(135deg, #ffb347, #ff8c42);
            border: none;
            color: #111;
            font-weight: 700;
            box-shadow: 0 8px 20px #ff8c4280;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn.primary:hover {
            filter: brightness(1.1);
        }

        .network-badge {
            background: #7d4e9a80;
            backdrop-filter: blur(12px);
            padding: 10px;
            border-radius: 40px;
            font-size: 0.9rem;
            text-align: center;
            border: 1px solid #b794f4;
            color: #f0d6ff;
        }

        /* 设置模态框 — 同样现代化 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: rgba(20, 35, 40, 0.9);
            backdrop-filter: blur(24px);
            border-radius: 56px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            color: #f0ead0;
            border: 1px solid #ffb34760;
            box-shadow: 0 40px 60px rgba(0,0,0,0.8);
        }

        .modal-content h2, h3 {
            font-weight: 500;
            letter-spacing: 1px;
            color: #ffdcaa;
        }

        .setting-group {
            margin: 28px 0;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.25);
            padding: 10px 18px;
            border-radius: 40px;
        }

        select, input[type="number"] {
            background: #1f3e3a;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            outline: 1px solid #ffb347;
            font-weight: 500;
        }

        .color-picker-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            background: #00000030;
            padding: 20px;
            border-radius: 40px;
        }

        .color-picker-group label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }

        .close-btn {
            float: right;
            font-size: 2.5rem;
            cursor: pointer;
            line-height: 1;
            color: #ffb347;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="board-section">
        <canvas id="board" width="640" height="640"></canvas>
    </div>

    <div class="info-panel">
        <div class="mode-bar">
            <button class="mode-btn active" data-mode="local">本地双人</button>
            <button class="mode-btn" data-mode="ai">🤖 人机</button>
            <button class="mode-btn" data-mode="network">🌐 网络(模拟)</button>
        </div>

        <!-- 统计：连珠数（方向数） -->
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">⚫ 黑连珠</div>
                <div class="stat-value black-stat" id="blackCombos">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">⚪ 白连珠</div>
                <div class="stat-value white-stat" id="whiteCombos">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">⚫ 棋子</div>
                <div class="stat-value black-stat" id="blackStones">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">⚪ 棋子</div>
                <div class="stat-value white-stat" id="whiteStones">0</div>
            </div>
        </div>

        <!-- 回合 & 连击数（🔥） -->
        <div class="turn-indicator">
            <div class="stone-badge" id="currentPlayerStone"></div>
            <span id="currentPlayerText">黑方回合</span>
            <span class="combo-fire" id="comboDisplay">🔥0</span>
        </div>

        <!-- 计时器 -->
        <div class="timer-section">
            <div style="opacity:0.8; letter-spacing:1px;">⏳ 总剩余</div>
            <div class="total-timer" id="totalTimer">10:00</div>
            <div style="margin-top:8px;" id="moveTimer">步时: --</div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-buttons">
            <button class="btn" id="settingsBtn">⚙️ 设置</button>
            <button class="btn primary" id="resetBtn">🔄 新开局</button>
        </div>

        <!-- 网络模拟提示 -->
        <div id="networkRoomInfo" style="display: none;" class="network-badge">房间号: 5271 (模拟演示)</div>
    </div>
</div>

<!-- 设置模态框 (现代化) -->
<div class="modal" id="settingsModal">
    <div class="modal-content">
        <span class="close-btn" id="closeModal">&times;</span>
        <h2>⚙️ 自定义游戏</h2>
        <div class="setting-group">
            <div class="setting-row"><span>棋盘大小</span> <select id="boardSize"><option value="9">9x9</option><option value="11">11x11</option><option value="13">13x13</option><option value="15" selected>15x15</option><option value="17">17x17</option><option value="19">19x19</option></select></div>
            <div class="setting-row"><span>连珠目标</span> <input type="number" id="comboTarget" value="25" min="5" max="100" step="1"></div>
            <div class="setting-row"><span>连击胜利阈值</span> <input type="number" id="comboWinThreshold" value="5" min="2" max="20"></div>
            <div class="setting-row"><span>总时间(分)</span> 
                <select id="totalTime">
                    <option value="0">不限</option>
                    <option value="1">1分钟</option>
                    <option value="3">3分钟</option>
                    <option value="5">5分钟</option>
                    <option value="10" selected>10分钟</option>
                    <option value="15">15分钟</option>
                    <option value="30">30分钟</option>
                    <option value="60">60分钟</option>
                </select>
            </div>
            <div class="setting-row"><span>每步限时(秒)</span> <select id="moveTime"><option value="0">不限</option><option value="30">30秒</option><option value="60">60秒</option></select></div>
            <div class="ai-difficulty-row setting-row"><span>🤖 AI难度</span> <select id="aiDifficulty"><option value="easy">简单 (随机)</option><option value="medium" selected>中等 (评分)</option><option value="hard">困难 (攻守兼备)</option></select></div>
        </div>
        <h3>🎨 主题色彩</h3>
        <div class="color-picker-group">
            <label>棋盘 <input type="color" id="boardBgPicker" value="#2d4a3b"></label>
            <label>网格线 <input type="color" id="gridColorPicker" value="#5a3e2b"></label>
            <label>黑子深 <input type="color" id="blackColor1" value="#111111"></label>
            <label>黑子亮 <input type="color" id="blackColor2" value="#666666"></label>
            <label>白子深 <input type="color" id="whiteColor1" value="#cccccc"></label>
            <label>白子亮 <input type="color" id="whiteColor2" value="#ffffff"></label>
        </div>
        <div style="margin-top:28px; text-align:right;">
            <button class="btn primary" id="applySettings">应用并重启</button>
        </div>
    </div>
</div>

<script>
(function() {
    // ----- 游戏全局状态 -----
    const GameState = {
        board: [], size: 15,
        // 连珠数（方向数）
        blackCombosDir: 0,
        whiteCombosDir: 0,
        // 当前回合连击数（长度折算累计）
        roundHitCombos: 0,
        currentPlayer: 1, // 1黑 2白
        round: 1,
        gameActive: true,
        winner: null,

        // 计时
        totalSeconds: 600,
        moveSecondsLeft: 0,
        moveLimit: 0,
        totalTimerInterval: null,
        moveTimerInterval: null,

        settings: {
            targetCombos: 25,
            comboWin: 5,
            totalTimeMin: 10,
            moveTimeSec: 0,
            aiDifficulty: 'medium',
        },

        mode: 'local',
        aiThinking: false,
        _aiPlacing: false,
    };

    // DOM
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const blackCombosSpan = document.getElementById('blackCombos');
    const whiteCombosSpan = document.getElementById('whiteCombos');
    const blackStonesSpan = document.getElementById('blackStones');
    const whiteStonesSpan = document.getElementById('whiteStones');
    const currentPlayerStoneDiv = document.getElementById('currentPlayerStone');
    const currentPlayerTextSpan = document.getElementById('currentPlayerText');
    const comboDisplaySpan = document.getElementById('comboDisplay');
    const totalTimerSpan = document.getElementById('totalTimer');
    const moveTimerSpan = document.getElementById('moveTimer');
    const networkRoomInfo = document.getElementById('networkRoomInfo');

    // 模式切换
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            GameState.mode = btn.dataset.mode;
            if (GameState.mode === 'network') {
                networkRoomInfo.style.display = 'block';
                alert('网络模式为前端模拟，无真实联机。');
            } else {
                networkRoomInfo.style.display = 'none';
            }
            resetGame();
        });
    });

    function initBoard() {
        GameState.board = Array(GameState.size).fill().map(() => Array(GameState.size).fill(0));
    }

    function resetGame() {
        if (GameState.totalTimerInterval) clearInterval(GameState.totalTimerInterval);
        if (GameState.moveTimerInterval) clearInterval(GameState.moveTimerInterval);
        GameState.totalTimerInterval = null;
        GameState.moveTimerInterval = null;

        GameState.blackCombosDir = 0;
        GameState.whiteCombosDir = 0;
        GameState.roundHitCombos = 0;
        GameState.currentPlayer = 1;
        GameState.round = 1;
        GameState.gameActive = true;
        GameState.winner = null;
        GameState.aiThinking = false;
        GameState._aiPlacing = false;

        GameState.size = parseInt(document.getElementById('boardSize').value);
        initBoard();

        const totalMin = parseInt(document.getElementById('totalTime').value);
        GameState.settings.totalTimeMin = totalMin;
        GameState.totalSeconds = totalMin * 60;
        if (GameState.totalSeconds === 0) GameState.totalSeconds = Infinity;

        GameState.moveLimit = parseInt(document.getElementById('moveTime').value);
        GameState.moveSecondsLeft = GameState.moveLimit;

        GameState.settings.targetCombos = parseInt(document.getElementById('comboTarget').value);
        GameState.settings.comboWin = parseInt(document.getElementById('comboWinThreshold').value);
        GameState.settings.aiDifficulty = document.getElementById('aiDifficulty').value;

        updateUI();
        drawBoard();

        if (GameState.totalSeconds > 0 && GameState.totalSeconds !== Infinity) {
            GameState.totalTimerInterval = setInterval(() => {
                if (!GameState.gameActive) return;
                if (GameState.totalSeconds <= 0) finishByTimeout();
                else { GameState.totalSeconds--; updateTimerDisplay(); }
            }, 1000);
        }
        startMoveTimer();
    }

    function finishByTimeout() {
        GameState.gameActive = false;
        let blackCnt = 0, whiteCnt = 0;
        for (let r=0; r<GameState.size; r++) for (let c=0; c<GameState.size; c++) {
            if (GameState.board[r][c] === 1) blackCnt++; else if (GameState.board[r][c] === 2) whiteCnt++;
        }
        if (blackCnt > whiteCnt) GameState.winner = 'black';
        else if (whiteCnt > blackCnt) GameState.winner = 'white';
        else GameState.winner = 'draw';
        updateUI(); drawBoard();
    }

    function startMoveTimer() {
        if (GameState.moveTimerInterval) clearInterval(GameState.moveTimerInterval);
        if (!GameState.gameActive) return;
        GameState.moveSecondsLeft = GameState.moveLimit;
        if (GameState.moveLimit <= 0) { moveTimerSpan.innerText = '步时: 不限'; return; }
        GameState.moveTimerInterval = setInterval(() => {
            if (!GameState.gameActive) return;
            if (GameState.moveSecondsLeft <= 0) {
                GameState.gameActive = false;
                GameState.winner = GameState.currentPlayer === 1 ? 'white' : 'black';
                clearInterval(GameState.moveTimerInterval);
                updateUI(); drawBoard();
            } else {
                GameState.moveSecondsLeft--;
                moveTimerSpan.innerText = `步时: ${GameState.moveSecondsLeft}s`;
            }
        }, 1000);
    }

    function updateUI() {
        // 连珠方向数
        blackCombosSpan.innerText = GameState.blackCombosDir;
        whiteCombosSpan.innerText = GameState.whiteCombosDir;

        // 棋子计数
        let blackCnt = 0, whiteCnt = 0;
        for (let r=0; r<GameState.size; r++) for (let c=0; c<GameState.size; c++) {
            if (GameState.board[r][c] === 1) blackCnt++; else if (GameState.board[r][c] === 2) whiteCnt++;
        }
        blackStonesSpan.innerText = blackCnt;
        whiteStonesSpan.innerText = whiteCnt;

        // 当前玩家
        if (GameState.currentPlayer === 1) {
            currentPlayerStoneDiv.style.background = 'radial-gradient(circle at 30% 30%, #666, #111)';
            currentPlayerTextSpan.innerText = '黑方回合';
        } else {
            currentPlayerStoneDiv.style.background = 'radial-gradient(circle at 30% 30%, #fff, #ccc)';
            currentPlayerTextSpan.innerText = '白方回合';
        }
        comboDisplaySpan.innerText = `🔥${GameState.roundHitCombos}`;
        updateTimerDisplay();

        if (GameState.winner) {
            let msg = GameState.winner === 'black' ? '⚫ 黑方胜利！' : (GameState.winner === 'white' ? '⚪ 白方胜利！' : '🤝 平局');
            setTimeout(() => alert(msg), 50);
        }
    }

    function updateTimerDisplay() {
        if (GameState.totalSeconds === Infinity) totalTimerSpan.innerText = '不限';
        else {
            const mins = Math.floor(GameState.totalSeconds / 60);
            const secs = GameState.totalSeconds % 60;
            totalTimerSpan.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
    }

    function drawBoard() {
        const size = GameState.size, w = canvas.width / size;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--board-bg').trim() || '#2d4a3b';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 1.8;
        ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--grid-color').trim() || '#5a3e2b';
        for (let i = 0; i < size; i++) {
            ctx.beginPath(); ctx.moveTo(i * w + w/2, w/2); ctx.lineTo(i * w + w/2, canvas.height - w/2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(w/2, i * w + w/2); ctx.lineTo(canvas.width - w/2, i * w + w/2); ctx.stroke();
        }
        // 星位
        const stars = [3, 7, 11]; ctx.fillStyle = '#9b7e5c';
        for (let r of stars) for (let c of stars) if (r < size && c < size) {
            ctx.beginPath(); ctx.arc(c * w + w/2, r * w + w/2, w*0.12, 0, 2*Math.PI); ctx.fill();
        }
        // 棋子
        for (let r = 0; r < size; r++) for (let c = 0; c < size; c++) {
            if (GameState.board[r][c] === 0) continue;
            const x = c * w + w/2, y = r * w + w/2;
            const gradient = ctx.createRadialGradient(x-4, y-4, 3, x, y, w*0.6);
            if (GameState.board[r][c] === 1) {
                gradient.addColorStop(0, getComputedStyle(document.documentElement).getPropertyValue('--black-stone').includes('#666')?'#666':'#666');
                gradient.addColorStop(1, '#111');
            } else {
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(1, '#ccc');
            }
            ctx.beginPath(); ctx.arc(x, y, w*0.44, 0, 2*Math.PI);
            ctx.fillStyle = gradient;
            ctx.shadowColor = 'rgba(0,0,0,0.7)';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowColor = 'transparent';
        }
    }

    // 核心消除：返回 { dirCount, hitCombo }
    function eliminateFromStone(row, col, player) {
        const dirs = [[1,0],[0,1],[1,1],[1,-1]];
        let segments = [];
        for (let [dx, dy] of dirs) {
            let coords = [];
            let r = row, c = col;
            while (r >= 0 && r < GameState.size && c >= 0 && c < GameState.size && GameState.board[r][c] === player) {
                coords.push([r, c]); r += dx; c += dy;
            }
            r = row - dx; c = col - dy;
            while (r >= 0 && r < GameState.size && c >= 0 && c < GameState.size && GameState.board[r][c] === player) {
                coords.push([r, c]); r -= dx; c -= dy;
            }
            if (coords.length >= 5) {
                const unique = Array.from(new Map(coords.map(p => [`${p[0]},${p[1]}`, p])).values());
                segments.push({ length: unique.length, coords: unique });
            }
        }
        if (segments.length === 0) return { dirCount: 0, hitCombo: 0 };

        // 方向数 = 触发的线段数（每个方向一条）
        const dirCount = segments.length;

        // 连击数：长度折算 5->1,6->2,7->3,8->4,9+->5
        let hitCombo = 0;
        for (let seg of segments) {
            let l = seg.length;
            let c = l - 4;          // 5-4=1,6-4=2...
            if (c > 5) c = 5;
            hitCombo += c;
        }

        // 移除棋子
        const toRemove = new Set();
        for (let seg of segments) for (let [rr, cc] of seg.coords) toRemove.add(`${rr},${cc}`);
        for (let str of toRemove) { let [rr, cc] = str.split(',').map(Number); GameState.board[rr][cc] = 0; }

        return { dirCount, hitCombo };
    }

    // 评分 (AI)
    function evaluatePosition(forPlayer) {
        const opponent = forPlayer === 1 ? 2 : 1;
        const scores = Array(GameState.size).fill().map(() => Array(GameState.size).fill(0));
        const dirs = [[1,0],[0,1],[1,1],[1,-1]];
        for (let r = 0; r < GameState.size; r++) for (let c = 0; c < GameState.size; c++) {
            if (GameState.board[r][c] !== 0) continue;
            let playerScore = 0, opponentScore = 0;
            for (let [dx, dy] of dirs) {
                let count = 1;
                let rr = r + dx, cc = c + dy;
                while (rr >= 0 && rr < GameState.size && cc >= 0 && cc < GameState.size && GameState.board[rr][cc] === forPlayer) { count++; rr += dx; cc += dy; }
                rr = r - dx; cc = c - dy;
                while (rr >= 0 && rr < GameState.size && cc >= 0 && cc < GameState.size && GameState.board[rr][cc] === forPlayer) { count++; rr -= dx; cc -= dy; }
                if (count >= 5) playerScore += 10000; else if (count === 4) playerScore += 500; else if (count === 3) playerScore += 200; else if (count === 2) playerScore += 20; else if (count === 1) playerScore += 1;

                count = 1;
                rr = r + dx; cc = c + dy;
                while (rr >= 0 && rr < GameState.size && cc >= 0 && cc < GameState.size && GameState.board[rr][cc] === opponent) { count++; rr += dx; cc += dy; }
                rr = r - dx; cc = c - dy;
                while (rr >= 0 && rr < GameState.size && cc >= 0 && cc < GameState.size && GameState.board[rr][cc] === opponent) { count++; rr -= dx; cc -= dy; }
                if (count >= 5) opponentScore += 8000; else if (count === 4) opponentScore += 400; else if (count === 3) opponentScore += 150; else if (count === 2) opponentScore += 15; else if (count === 1) opponentScore += 1;
            }
            scores[r][c] = { player: playerScore, opponent: opponentScore };
        }
        return scores;
    }

    function aiMove() {
        if (GameState.aiThinking) return;
        if (!GameState.gameActive || GameState.currentPlayer !== 2) return;
        GameState.aiThinking = true;
        updateUI();

        setTimeout(() => {
            if (!GameState.gameActive || GameState.currentPlayer !== 2) {
                GameState.aiThinking = false;
                return;
            }
            const difficulty = GameState.settings.aiDifficulty;
            let empty = [];
            for (let r=0; r<GameState.size; r++) for (let c=0; c<GameState.size; c++) if (GameState.board[r][c] === 0) empty.push([r,c]);
            if (empty.length === 0) {
                GameState.gameActive = false; GameState.winner = 'draw';
                GameState.aiThinking = false; updateUI(); drawBoard(); return;
            }
            let chosenRow, chosenCol;
            if (difficulty === 'easy') {
                [chosenRow, chosenCol] = empty[Math.floor(Math.random() * empty.length)];
            } else {
                const scores = evaluatePosition(2);
                let bestScore = -1, candidates = [];
                for (let r=0; r<GameState.size; r++) for (let c=0; c<GameState.size; c++) {
                    if (GameState.board[r][c] !== 0) continue;
                    let totalScore = (difficulty === 'medium') ? scores[r][c].player : scores[r][c].player + scores[r][c].opponent * 0.8;
                    if (totalScore > bestScore) { bestScore = totalScore; candidates = [[r, c]]; }
                    else if (totalScore === bestScore) candidates.push([r, c]);
                }
                if (candidates.length === 0) [chosenRow, chosenCol] = empty[Math.floor(Math.random() * empty.length)];
                else [chosenRow, chosenCol] = candidates[Math.floor(Math.random() * candidates.length)];
            }
            GameState._aiPlacing = true;
            GameState.aiThinking = false;
            tryPlace(chosenRow, chosenCol);
            GameState._aiPlacing = false;
        }, 200);
    }

    function tryPlace(row, col) {
        if (!GameState.gameActive) return false;
        if (GameState.board[row][col] !== 0) return false;
        if (GameState.mode === 'ai' && GameState.currentPlayer === 2 && !GameState._aiPlacing) {
            alert('现在是AI回合，请等待');
            return false;
        }
        if (GameState.aiThinking && !GameState._aiPlacing) return false;

        GameState.board[row][col] = GameState.currentPlayer;
        drawBoard();

        const { dirCount, hitCombo } = eliminateFromStone(row, col, GameState.currentPlayer);
        const eliminated = (dirCount > 0);

        if (eliminated) {
            // 更新连珠方向数
            if (GameState.currentPlayer === 1) GameState.blackCombosDir += dirCount;
            else GameState.whiteCombosDir += dirCount;
            // 更新回合连击数
            GameState.roundHitCombos += hitCombo;
        }

        if (checkWinConditions()) {
            GameState.gameActive = false;
            updateUI(); drawBoard();
            return true;
        }

        if (eliminated) {
            updateUI(); drawBoard();
            if (GameState.moveLimit > 0) startMoveTimer();
            if (GameState.mode === 'ai' && GameState.currentPlayer === 2 && GameState.gameActive) {
                setTimeout(() => aiMove(), 10);
            }
            return true;
        }

        // 无消除，换人
        GameState.currentPlayer = GameState.currentPlayer === 1 ? 2 : 1;
        GameState.round++;
        GameState.roundHitCombos = 0;
        updateUI(); drawBoard();
        if (GameState.moveLimit > 0) startMoveTimer();

        if (GameState.mode === 'ai' && GameState.currentPlayer === 2 && GameState.gameActive) {
            setTimeout(() => aiMove(), 10);
        }
        return true;
    }

    function checkWinConditions() {
        // 回合连击胜利
        if (GameState.roundHitCombos >= GameState.settings.comboWin) {
            GameState.winner = GameState.currentPlayer === 1 ? 'black' : 'white';
            return true;
        }
        // 总连珠方向数目标
        if (GameState.blackCombosDir + GameState.whiteCombosDir >= GameState.settings.targetCombos) {
            if (GameState.blackCombosDir > GameState.whiteCombosDir) GameState.winner = 'black';
            else if (GameState.whiteCombosDir > GameState.blackCombosDir) GameState.winner = 'white';
            else GameState.winner = 'draw';
            return true;
        }
        return false;
    }

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX, mouseY = (e.clientY - rect.top) * scaleY;
        const w = canvas.width / GameState.size;
        const col = Math.floor(mouseX / w), row = Math.floor(mouseY / w);
        if (row >= 0 && row < GameState.size && col >= 0 && col < GameState.size) {
            tryPlace(row, col);
        }
    });

    document.getElementById('resetBtn').addEventListener('click', resetGame);

    // 设置
    const modal = document.getElementById('settingsModal');
    document.getElementById('settingsBtn').addEventListener('click', () => modal.classList.add('active'));
    document.getElementById('closeModal').addEventListener('click', () => modal.classList.remove('active'));
    document.getElementById('applySettings').addEventListener('click', () => {
        document.documentElement.style.setProperty('--board-bg', document.getElementById('boardBgPicker').value);
        document.documentElement.style.setProperty('--grid-color', document.getElementById('gridColorPicker').value);
        document.documentElement.style.setProperty('--black-stone', `radial-gradient(circle at 30% 30%, ${document.getElementById('blackColor2').value}, ${document.getElementById('blackColor1').value})`);
        document.documentElement.style.setProperty('--white-stone', `radial-gradient(circle at 30% 30%, ${document.getElementById('whiteColor2').value}, ${document.getElementById('whiteColor1').value})`);
        modal.classList.remove('active');
        resetGame();
    });

    resetGame();
})();
</script>
