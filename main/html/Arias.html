<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>阿斯特里斯魔王军电台</title>
		<link rel="stylesheet" href="../../font/Maple.css">
		<link rel="stylesheet" href="../css/main.css">
		<link rel="stylesheet" href="../css/Arias.css">
		<link 
			rel="shortcut icon"
			href="https://pan.xxbyq.net/f/G7JQHy/0128_onanii.png"
			type="image/x-icon"
		/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <!-- 组件加载脚本 -->
        <script src="/js/components.js"></script>
	</head>
	<body data-components="navbar,footer" data-theme-button="true">
		<!-- 导航栏容器 -->
		<div id="navbar-container"></div>

		<div class="page-content">
			<h1>魔王电台 · 故事集</h1>
            <p class="intro-text">在这里收听或阅读我们的故事...</p>

            <div class="text-grid" id="textGrid">
                </div>
		</div>

        <div id="readerModal" class="reader-overlay">
            <div class="reader-container">
                <div class="reader-header">
                    <h2 id="reader-title">标题</h2>
                    <div class="reader-controls">
                        <span class="close-reader">&times;</span>
                    </div>
                </div>
                <div class="reader-content">
                    <div class="reader-meta">
                        <span id="reader-author"><i class="fas fa-user"></i> 作者</span>
                        <span id="reader-date"><i class="far fa-clock"></i> 时间</span>
                    </div>
                    <div class="reader-divider"></div>
                    <div id="reader-body" class="article-body"></div>
                </div>
            </div>
        </div>

		<!-- 页脚容器 -->
		<div id="footer-container"></div>

        <script src="../js/arias.js"></script>
	</body>
</html>
